services:
  # Main Public Marketplace (Customers & Workers)
  - type: web
    name: smart-city-services
    env: node
    plan: free
    buildCommand: "npm --prefix frontend install && export VITE_ADMIN_PORTAL=false && npm --prefix frontend run build && npm --prefix backend install"
    startCommand: "node backend/server.js"
    envVars:
      - key: NODE_ENV
        value: production
      - key: VITE_ADMIN_PORTAL
        value: "false"
      - key: POSTGRES_URL
        fromDatabase:
          name: smart-city-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: FRONTEND_ORIGIN
        value: "https://smart-city-services-ag9z.onrender.com"

  # Dedicated Admin Management Hub
  - type: web
    name: smart-city-admin
    env: node
    plan: free
    buildCommand: "npm --prefix frontend install && export VITE_ADMIN_PORTAL=true && npm --prefix frontend run build && npm --prefix backend install"
    startCommand: "node backend/server.js" # No migrations on admin service to avoid dual conflicts
    envVars:
      - key: NODE_ENV
        value: production
      - key: VITE_ADMIN_PORTAL
        value: "true"
      - key: POSTGRES_URL
        fromDatabase:
          name: smart-city-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: FRONTEND_ORIGIN
        value: "https://smart-city-admin.onrender.com"

databases:
  - name: smart-city-db
    databaseName: smart_city_services
    user: smartcityuser
    plan: free
